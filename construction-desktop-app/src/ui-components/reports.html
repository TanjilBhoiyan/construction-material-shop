<div id="report-screen" class="p-6 space-y-6">
    <h2 class="text-xl font-bold text-blue-600 border-b pb-2">📊 দৈনিক বেচাকেনা ও লাভ-ক্ষতির হিসাব</h2>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <div class="bg-blue-500 text-white p-4 rounded-lg shadow-md">
            <p class="text-sm font-medium">আজকের মোট বিক্রি (Total Sales)</p>
            <p class="text-2xl font-black">৳<span id="rep-total-sales">0.00</span></p>
        </div>
        <div class="bg-green-500 text-white p-4 rounded-lg shadow-md">
            <p class="text-sm font-medium">আজকের নগদ আদায় (Cash Received)</p>
            <p class="text-2xl font-black">৳<span id="rep-cash-received">0.00</span></p>
        </div>
        <div class="bg-red-500 text-white p-4 rounded-lg shadow-md">
            <p class="text-sm font-medium">আজকের মোট বাকি (Total Due)</p>
            <p class="text-2xl font-black">৳<span id="rep-total-due">0.00</span></p>
        </div>
        <div class="bg-purple-600 text-white p-4 rounded-lg shadow-md animate-pulse">
            <p class="text-sm font-medium">আজকের আনুমানিক লাভ (Net Profit)</p>
            <p class="text-2xl font-black">৳<span id="rep-net-profit">0.00</span></p>
        </div>
    </div>

    <div class="bg-white p-4 rounded-lg shadow mb-4 flex items-end justify-between gap-4">
        <div class="flex items-end gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">তারিখ সিলেক্ট করুন</label>
                <input type="date" id="report-single-date"
                    class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button id="btn-filter-report"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-4 py-2 rounded shadow transition">
                🔍 হিসাব দেখুন
            </button>
        </div>
        <button id="btn-reset-report"
            class="bg-gray-500 hover:bg-gray-600 text-white font-medium text-sm px-4 py-2 rounded shadow transition">
            🔄 আজকের দিন
        </button>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md">
        <h3 class="text-lg font-bold text-gray-700 mb-4">📝 মেমোসমূহের তালিকা</h3>
        <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 text-sm">
                <thead class="bg-gray-50">
                    <tr class="bg-gray-100 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">
                        <th class="px-4 py-3 border-b">তারিখ ও সময়</th>
                        <th class="px-4 py-3 border-b">কাস্টমারের নাম</th>
                        <th class="px-4 py-3 border-b">মোবাইল নম্বর</th>
                        <th class="px-4 py-3 border-b">ঠিকানা</th>
                        <th class="px-4 py-3 border-b">মোট বিল</th>
                        <th class="px-4 py-3 border-b">নগদ জমা</th>
                        <th class="px-4 py-3 border-b">বাকি</th>
                    </tr>
                </thead>
                <tbody id="report-sales-tbody" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </div>
</div>
