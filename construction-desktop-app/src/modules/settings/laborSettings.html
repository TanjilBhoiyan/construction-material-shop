<!-- modules/settings/laborSettings.html -->
<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 max-w-2xl mx-auto my-6 animate-fade-in">
    <div class="flex items-center gap-3 pb-4 border-b border-gray-100 mb-6">
        <span class="text-2xl">⚙️</span>
        <div>
            <h3 class="text-xl font-bold text-gray-800">লেবার রেট সেটিংস</h3>
            <p class="text-xs text-gray-500 mt-0.5">এখানে সেট করা রেট অনুযায়ী নতুন বিলের অতিরিক্ত খরচ (লেবার বিল) অটো-ক্যালকুলেট হবে।</p>
        </div>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- সিমেন্ট কার্ড -->
        <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
            <label class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-1.5">
                📦 সিমেন্ট লেবার রেট:
            </label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 font-bold text-sm">৳</span>
                <input type="number" id="setting-cement-rate" step="0.5" min="0" class="w-full pl-8 pr-12 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-gray-700 text-lg">
                <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 text-xs font-medium bg-gray-200 border-l px-2 rounded-r-md">প্রতি বস্তা</span>
            </div>
        </div>
        
        <!-- রড কার্ড -->
        <div class="bg-gray-50 p-4 rounded-lg border border-gray-100">
            <label class="block text-sm font-semibold text-gray-700 mb-2 flex items-center gap-1.5">
                🏗️ রড লেবার রেট:
            </label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400 font-bold text-sm">৳</span>
                <input type="number" id="setting-rod-rate" step="0.01" min="0" class="w-full pl-8 pr-12 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-gray-700 text-lg">
                <span class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 text-xs font-medium bg-gray-200 border-l px-2 rounded-r-md">প্রতি কেজি</span>
            </div>
        </div>
    </div>
    
    <!-- অ্যাকশন বাটন -->
    <div class="mt-8 pt-4 border-t border-gray-100 flex justify-end">
        <button id="btn-save-labor-settings" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-6 rounded-md text-sm shadow transition flex items-center justify-center gap-2">
            💾 রেট সেটিংস আপডেট করুন
        </button>
    </div>
</div>
